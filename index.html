<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relocation Landing Page</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="hero">
    <header class="navbar">
      <div class="logo-box">
        <img src="#" alt="Logo" class="logo-img">
        <div class="logo-text">
          <p>One platform meeting all<br>your relocation needs</p>
        </div>
      </div>

      <nav class="nav-links">
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Blog</a>
        <a href="#">Contact</a>
      </nav>

      <a href="#" class="nav-btn">Take a scoring test</a>
    </header>
    <div class="hero-content">
      <div class="hero-text">
        <div class="circle-bg"></div>

        <h1>
          One platform <br>
          meeting <span>all your</span> <br>
          <span>relocation</span> needs
        </h1>

        <p>
          Get a Global Talent Visa and relocate to the UK.<br>
          Start your journey now
        </p>

        <div class="hero-buttons">
          <a href="#" class="main-btn">Take a scoring test</a>
          <span class="small-text">
            Evaluate your chances and get detailed<br>
            feedback from our team
          </span>
        </div>
      </div>
      <div class="hero-image-area">
        <div class="window-lines"></div>
        <img src="#" alt="Plane" class="plane-img">
        <img src="#" alt="Plant" class="plant-img">
        <img src="#" alt="Luggage" class="luggage-img">
        <img src="#" alt="Traveler" class="person-img">
      </div>
    </div>
    <div class="brands">
      <img src="#" alt="HSBC">
      <img src="#" alt="Vodafone">
      <img src="#" alt="Revolut">
      <img src="#" alt="Oracle">
      <img src="#" alt="Google">
      <img src="#" alt="Facebook">
      <img src="#" alt="JPMorgan">
      <img src="#" alt="Cisco">
      <img src="#" alt="Microsoft">
    </div>

  </section>

</body>
</html>
