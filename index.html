<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relocation Landing Page</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="hero">
    <header class="navbar">
      <div class="logo-box">
        <img src="./logo.png" alt="Logo" class="logo-img">
        <div class="logo-text">
          <p>One platform meeting all<br>your relocation needs</p>
        </div>
      </div>

      <nav class="nav-links">
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">Blog</a>
        <a href="#">Contact</a>
      </nav>

      <a href="#" class="nav-btn">Take a scoring test</a>
    </header>
    <div class="hero-content">
      <div class="hero-text">
        <div class="circle-bg"></div>

        <h1>
          One platform <br>
          meeting <span>all your</span> <br>
          <span>relocation</span> needs
        </h1>

        <p>
          Get a Global Talent Visa and relocate to the UK.<br>
          Start your journey now
        </p>

        <div class="hero-buttons">
          <a href="#" class="main-btn">Take a scoring test</a>
          <span class="small-text">
            Evaluate your chances and get detailed<br>
            feedback from our team
          </span>
        </div>
      </div>
       <div class="right">
        <img src="img 1.png" class="plane-bg">
        <img src="img.png"class="traveler-img">
      </div>
    </div>
    <div class="brands">
      <img src="./ikonok.png">
      <img src="./iconoc 2.png">
      <img src="./ikonok 3.png">
      <img src="./ikonok 4.png">
      <img src="./ikonok 5.png">
      <img src="./ikonok 6.png">
      <img src="./ikonok 7.png">
      <img src="./ikonok 8.png">
      <img src="./ikonok 9.png">
    </div>

  </section>

</html>
